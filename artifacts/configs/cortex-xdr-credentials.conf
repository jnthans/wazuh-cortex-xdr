# systemd drop-in: inject encrypted Cortex XDR credentials into wazuh-manager
# =============================================================================
# File: /etc/systemd/system/wazuh-manager.service.d/cortex-xdr-credentials.conf
#
# This is a drop-in override for the wazuh-manager service. It tells systemd
# to decrypt the credential files at service start time and expose them to the
# wodle process via the $CREDENTIALS_DIRECTORY environment variable.
#
# The decrypted values exist ONLY in a tmpfs (non-swappable RAM) mount for the
# lifetime of the service. They are never written to disk in plaintext.
#
# PREREQUISITES
# ─────────────────────────────────────────────────────────────────────────────
# • systemd 250+ (Ubuntu 22.10+, Debian 12+, RHEL 9.0+)
#   Check:  systemctl --version
#
# • Encrypted credential files must exist before restarting the service.
#   Create them with the commands in SETUP below.
#
# SETUP (run once as root)
# ─────────────────────────────────────────────────────────────────────────────
#   # 1. Create the encrypted credential store directory
#   mkdir -p /etc/credstore.encrypted
#   chmod 700 /etc/credstore.encrypted
#
#   # 2. Encrypt your credentials (you will be prompted or can pipe via stdin)
#   printf 'yourorg.xdr.us.paloaltonetworks.com' | \
#       systemd-creds encrypt --name=xdr_fqdn - \
#       /etc/credstore.encrypted/xdr_fqdn.cred
#
#   printf 'YOUR_API_KEY_SECRET_VALUE' | \
#       systemd-creds encrypt --name=xdr_api_key - \
#       /etc/credstore.encrypted/xdr_api_key.cred
#
#   printf 'YOUR_KEY_ID_NUMBER' | \
#       systemd-creds encrypt --name=xdr_api_key_id - \
#       /etc/credstore.encrypted/xdr_api_key_id.cred
#
#   chmod 600 /etc/credstore.encrypted/*.cred
#
#   # 3. Install this drop-in file
#   mkdir -p /etc/systemd/system/wazuh-manager.service.d/
#   cp cortex-xdr-credentials.conf \
#      /etc/systemd/system/wazuh-manager.service.d/
#
#   # 4. Apply
#   systemctl daemon-reload
#   systemctl restart wazuh-manager
#
# VERIFICATION
# ─────────────────────────────────────────────────────────────────────────────
#   # Confirm credentials are visible inside the service context:
#   systemctl show wazuh-manager | grep -i credential
#
#   # Test the wodle can see them (run as wazuh or root):
#   sudo -u wazuh CREDENTIALS_DIRECTORY=$(systemctl show wazuh-manager \
#       --property=CredentialDirectory --value) \
#       /var/ossec/wodles/cortex-xdr/run.sh --type alerts --all --debug 2
#
# KEY ROTATION
# ─────────────────────────────────────────────────────────────────────────────
#   Re-run step 2 with the new key value, then:
#   systemctl restart wazuh-manager
#   No changes to ossec.conf or run.sh are required.
#
# MIGRATION TO A NEW HOST
# ─────────────────────────────────────────────────────────────────────────────
#   Credentials are encrypted with a machine-bound key. You CANNOT copy the
#   .cred files to a new host and expect them to decrypt. Re-run step 2 on
#   the new host after migrating.
# =============================================================================

[Service]
LoadCredentialEncrypted=xdr_fqdn:/etc/credstore.encrypted/xdr_fqdn.cred
LoadCredentialEncrypted=xdr_api_key:/etc/credstore.encrypted/xdr_api_key.cred
LoadCredentialEncrypted=xdr_api_key_id:/etc/credstore.encrypted/xdr_api_key_id.cred
