<!--
  Cortex XDR Wazuh Integration – ossec.conf
  ==========================================
  Add the block below inside your <ossec_config> section.
  File: /var/ossec/etc/ossec.conf

  RECOMMENDED SETUP: one wodle block, no flags required.
  The mode is configured in run.sh via XDR_MODE (default: balanced).

  MODES
  ─────────────────────────────────────────────────────────────────────────────
  economy   Incidents only (all statuses via modification_time bookmark).
            No alerts. Use when storage is constrained or you only need the
            correlated SOC-level view. Incidents already aggregate alerts.

  balanced  Incidents (all statuses) + high/critical alerts (all actions).
  (default) Recommended for most production environments.

  enriched  All incidents + all alerts (all severities, DETECTED + BLOCKED)
            + scalar enrichment from get_incident_extra_data.
            Use for full archival fidelity or compliance requirements.

  Set XDR_MODE in run.sh, or pass --mode on the command line to override.
  Individual flags (--type, --alert-severities, etc.) override the mode.

  INCIDENT LIFECYCLE
  ─────────────────────────────────────────────────────────────────────────────
  A single modification_time bookmark captures the full incident lifecycle.
  New incidents, analyst status transitions, and closures all update
  modification_time — every change surfaces on the next run at zero extra
  API cost. Wazuh rules fire at level 6–15 for active incidents, level 3
  for closed incidents (archival records).

  LONG-TERM ARCHIVAL
  ─────────────────────────────────────────────────────────────────────────────
  Cortex does not retain alert and incident data indefinitely. This
  integration persists all ingested data in OpenSearch, providing a
  long-term record for compliance, forensics, and historical investigation.

  VALID WODLE COMMAND TAGS
  ─────────────────────────────────────────────────────────────────────────────
  disabled, tag, command, ignore_output, timeout, run_on_start, interval.
  Note: max_output_size is NOT a valid tag — the hard line limit is 65,535
  bytes enforced internally by Wazuh. The wodle stays well within this by
  default (~1.5 KB per incident); enriched mode adds scalar fields (~2–4 KB).

  After editing:
    systemctl restart wazuh-manager
    # Docker: docker exec <container> /var/ossec/bin/wazuh-control restart
-->


<!-- ══════════════════════════════════════════════════════════
     RECOMMENDED: single block, mode set in run.sh
     Change XDR_MODE in run.sh to switch between economy /
     balanced / enriched without touching ossec.conf.
     ════════════════════════════════════════════════════════ -->
<wodle name="command">
  <disabled>no</disabled>
  <tag>cortex-xdr</tag>
  <command>/var/ossec/wodles/cortex-xdr/run.sh</command>
  <interval>5m</interval>
  <ignore_output>no</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>300</timeout>
</wodle>


<!-- ══════════════════════════════════════════════════════════
     ALTERNATIVE: explicit mode on the command line
     Useful if you want ossec.conf to be self-documenting
     or need different modes per tenant.
     ════════════════════════════════════════════════════════ -->
<!--
<wodle name="command">
  <disabled>no</disabled>
  <tag>cortex-xdr</tag>
  <command>/var/ossec/wodles/cortex-xdr/run.sh --mode balanced</command>
  <interval>5m</interval>
  <ignore_output>no</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>300</timeout>
</wodle>
-->


<!-- ══════════════════════════════════════════════════════════
     OVERRIDE EXAMPLES
     Modes set sensible defaults; individual flags override them.
     ════════════════════════════════════════════════════════ -->
<!--
  Economy but with enrichment:
  <command>run.sh --mode economy --enrich</command>

  Balanced but include all severities:
  <command>run.sh --mode balanced --alert-severities all</command>

  Enriched but incidents only:
  <command>run.sh --mode enriched --type incidents</command>
-->


<!-- ══════════════════════════════════════════════════════════
     HISTORICAL BACKFILL — run once manually.
     Does NOT update state. Safe to run repeatedly.

     # 1 year, full fidelity:
     run.sh --mode enriched --all --lookback 8760

     # Last 24 hours, balanced, with debug output:
     run.sh --mode balanced --all --lookback 24 --debug 1 2>&1
     ════════════════════════════════════════════════════════ -->


