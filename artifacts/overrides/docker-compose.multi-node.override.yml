# =============================================================================
# docker-compose.multi-node.override.yml
# Cortex XDR Integration – Multi-Node Wazuh Docker
# =============================================================================
#
# DIRECTORY LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
# The volume paths below (../wodle, ../rules) assume wazuh-cortex-xdr sits
# ALONGSIDE wazuh-docker, not inside it:
#
#   your-workspace/
#   ├── wazuh-docker/
#   │   └── multi-node/           ← run docker compose from here
#   └── wazuh-cortex-xdr/
#       ├── wodle/
#       ├── rules/
#       └── artifacts/overrides/  ← this file lives here
#
# If wazuh-cortex-xdr is cloned INSIDE wazuh-docker, adjust every volume
# source path: ../../wodle → ../wazuh-cortex-xdr/wodle  (and so on).
#
# USAGE
# ─────────────────────────────────────────────────────────────────────────────
# Run from wazuh-docker/multi-node/:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f ../../wazuh-cortex-xdr/artifacts/overrides/docker-compose.multi-node.override.yml \
#     up -d
#
# FILE OWNERSHIP — HANDLED AUTOMATICALLY
# ─────────────────────────────────────────────────────────────────────────────
# The inline entrypoint detects the wazuh UID/GID at runtime and fixes
# bind-mount ownership before Wazuh starts. No host-side chown required.
# Works on Linux, macOS, and Windows Docker Desktop.
#
# MULTI-NODE SPECIFICS
# ─────────────────────────────────────────────────────────────────────────────
# Wodles run ONLY on the master node. Workers only need rules and decoder.
#
#   wazuh.master  →  inline entrypoint + wodle + credentials + rules + decoder
#   wazuh.worker  →  rules + decoder only (standard entrypoint, no changes)
#
# If you have more than one worker, duplicate the wazuh.worker block and
# update the service name to match each worker in your base compose file.
#
# CREDENTIALS
# ─────────────────────────────────────────────────────────────────────────────
# Copy and edit ../wodle/.secrets before starting the stack.
#
# OSSEC.CONF
# ─────────────────────────────────────────────────────────────────────────────
# Add the wodle stanza from artifacts/configs/ossec_cortex_xdr.conf to the master config:
#   wazuh-docker/multi-node/config/wazuh_cluster/wazuh_manager.conf
#
# Wazuh 5.x note: update volume target paths if using /var/wazuh-manager/
# =============================================================================

services:

  # ── Master: inline entrypoint + wodle + credentials + rules + decoder ───────
  wazuh.master:

    entrypoint:
      - sh
      - -c
      - |
        set -e
        WZ_UID=$$(id -u wazuh)
        WZ_GID=$$(id -g wazuh)
        echo "[cortex-xdr] wazuh UID=$${WZ_UID} GID=$${WZ_GID} — fixing ownership..."
        chown -R "root:$${WZ_GID}" /var/ossec/wodles/cortex-xdr
        chmod 750 /var/ossec/wodles/cortex-xdr
        [ -f /var/ossec/wodles/cortex-xdr/run.sh ]  && chmod 750 /var/ossec/wodles/cortex-xdr/run.sh
        [ -f /var/ossec/wodles/cortex-xdr/.secrets ] && chmod 640 /var/ossec/wodles/cortex-xdr/.secrets
        chown "root:$${WZ_GID}" /var/ossec/etc/rules/cortex_xdr_rules.xml
        chmod 660 /var/ossec/etc/rules/cortex_xdr_rules.xml
        chown "root:$${WZ_GID}" /var/ossec/etc/decoders/cortex_xdr_decoder.xml
        chmod 660 /var/ossec/etc/decoders/cortex_xdr_decoder.xml
        echo "[cortex-xdr] Permissions OK — handing off to Wazuh entrypoint..."
        exec /init

    environment:
      - XDR_SECRETS_FILE=/var/ossec/wodles/cortex-xdr/.secrets

    volumes:
      - ../../wodle:/var/ossec/wodles/cortex-xdr
      - ../../rules/cortex_xdr_rules.xml:/var/ossec/etc/rules/cortex_xdr_rules.xml
      - ../../rules/cortex_xdr_decoder.xml:/var/ossec/etc/decoders/cortex_xdr_decoder.xml

  # ── Worker: rules + decoder only (no wodle, no credentials, no changes) ─────
  wazuh.worker:

    volumes:
      - ../../rules/cortex_xdr_rules.xml:/var/ossec/etc/rules/cortex_xdr_rules.xml
      - ../../rules/cortex_xdr_decoder.xml:/var/ossec/etc/decoders/cortex_xdr_decoder.xml